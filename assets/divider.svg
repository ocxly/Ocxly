<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 40" width="1200" height="40" fill="none" role="img" aria-label="divider">
  <defs>
    <linearGradient id="dline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6E44FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#9B51E0" stop-opacity="0"/>
    </linearGradient>
    <filter id="dg" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <line x1="40" y1="20" x2="1160" y2="20" stroke="url(#dline)" stroke-width="2" filter="url(#dg)"/>
  <polygon points="600,8 612,20 600,32 588,20" fill="#00D4FF" filter="url(#dg)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="40" cy="20" r="4" fill="#00D4FF" filter="url(#dg)">
    <animate attributeName="cx" values="40;1160;40" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1160" cy="20" r="3" fill="#9B51E0" filter="url(#dg)">
    <animate attributeName="cx" values="1160;40;1160" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
